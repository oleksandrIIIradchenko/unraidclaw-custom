name: Build UnraidClaw Browse

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override (e.g. 0.1.28-browse5)"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-unraidclaw-browse.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "packages/shared/**"
      - "packages/unraid-plugin/**"

permissions:
  contents: read

jobs:
  build-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        shell: bash
        run: |
          INPUT_VERSION='${{ github.event.inputs.version }}'
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(grep -oP 'ENTITY\s+version\s+"\K[^"]+' packages/unraid-plugin/unraidclaw-browse.plg | head -n1)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Build plugin package
        run: bash packages/unraid-plugin/scripts/build.sh "${{ steps.version.outputs.version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unraidclaw-browse-${{ steps.version.outputs.version }}
          path: |
            packages/unraid-plugin/build/unraidclaw-browse-${{ steps.version.outputs.version }}-x86_64-1.txz
            packages/unraid-plugin/build/unraidclaw-browse-${{ steps.version.outputs.version }}-x86_64-1.txz.md5
            packages/unraid-plugin/unraidclaw-browse.plg
          if-no-files-found: error
