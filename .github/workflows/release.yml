name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: bash packages/unraid-plugin/scripts/build.sh "${{ steps.version.outputs.version }}"

      - name: Read MD5
        id: md5
        shell: bash
        run: |
          echo "md5=$(cat packages/unraid-plugin/build/unraidclaw-browse-${{ steps.version.outputs.version }}-x86_64-1.txz.md5)" >> "$GITHUB_OUTPUT"

      - name: Update .plg version and MD5
        shell: bash
        run: |
          PLG="packages/unraid-plugin/unraidclaw-browse.plg"
          sed -i 's/<!ENTITY version   "[^"]*">/<!ENTITY version   "${{ steps.version.outputs.version }}">/' "$PLG"
          sed -i 's/<!ENTITY md5       "[^"]*">/<!ENTITY md5       "${{ steps.md5.outputs.md5 }}">/' "$PLG"

      - name: Commit .plg update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/unraid-plugin/unraidclaw-browse.plg
          git diff --cached --quiet && echo "No .plg changes to commit" || git commit -m "release: update unraidclaw-browse.plg for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG="packages/unraid-plugin/build/unraidclaw-browse-${VERSION}-x86_64-1.txz"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "$PKG" \
            "${PKG}.md5" \
            "packages/unraid-plugin/unraidclaw-browse.plg"
